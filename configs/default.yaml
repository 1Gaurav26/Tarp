# Water Leak Localization - Production Configuration
# ===================================================

# Graph Parameters
graph:
  num_nodes: 200
  edge_probability: 0.08
  reservoir_nodes: 2
  min_conductance: 0.5
  max_conductance: 2.0

# Sensor Configuration
sensors:
  ratio: 0.4
  noise_std: 0.1

# Demand Distribution
demand:
  mean: 1.0
  std: 0.5
  reservoir_head: 50.0

# Leak Parameters
leak:
  probability: 0.8
  magnitude_min: 0.5
  magnitude_max: 5.0

# Dataset Generation (larger for production)
data:
  train_samples: 50000
  val_samples: 5000
  test_samples: 5000
  output_dir: "data"

# Training Parameters (tuned for convergence)
training:
  batch_size: 64
  epochs: 150
  learning_rate: 0.0003
  weight_decay: 1.0e-4
  patience: 30
  focal_gamma: 2.0
  no_leak_weight: 0.5
  grad_accum_steps: 2        # Effective batch = 128
  use_amp: true              # Mixed-precision training on GPU
  scheduler: "cosine"        # cosine | plateau
  warmup_epochs: 5

# Model Architecture (larger capacity)
model:
  in_dim: 7                  # Enriched 7-dim features
  hidden_dim: 256
  num_layers: 5
  num_heads: 4
  dropout: 0.15
  edge_dim: 2

# Stage 2 Parameters
stage2:
  top_k: 5
  use_physics: true

# Evaluation
eval:
  top_k_values: [1, 3, 5, 10]

# Reproducibility
seed: 42
