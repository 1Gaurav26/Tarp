# Water Leak Localization - L-Town (BattLeDIM) Configuration
# ===========================================================
# Real network: 785 nodes, 909 links, 2 reservoirs, 1 tank
# Source: https://zenodo.org/records/4017659

# Real Network (overrides random graph generation)
network:
  inp_file: "data/networks/L-TOWN.inp"
  type: "real"  # "real" | "synthetic"

# Graph Parameters (auto-detected from .inp, listed for reference)
graph:
  num_nodes: 785         # 782 junctions + 2 reservoirs + 1 tank
  reservoir_nodes: 3     # R1, R2, T1
  # edge_probability and conductance params are ignored for real networks

# Sensor Configuration
sensors:
  ratio: 0.25            # ~195 sensors for better coverage
  noise_std: 0.1

# Demand Distribution
demand:
  mean: 1.0
  std: 0.5
  reservoir_head: 50.0

# Leak Parameters
leak:
  probability: 0.8
  magnitude_min: 5.0
  magnitude_max: 50.0

# Dataset Generation
data:
  train_samples: 5000
  val_samples: 800
  test_samples: 800
  output_dir: "data/real"

# Training Parameters (adjusted for larger network)
training:
  batch_size: 32           # Smaller batch due to larger graph
  epochs: 100
  learning_rate: 0.0003    # Slightly lower for stability
  weight_decay: 1.0e-4
  patience: 20             # More patience for larger network
  focal_gamma: 2.0
  no_leak_weight: 0.5
  grad_accum_steps: 4      # Effective batch = 128
  use_amp: true
  scheduler: "cosine"
  warmup_epochs: 8

# Model Architecture (scaled for 785 nodes)
model:
  in_dim: 7
  hidden_dim: 128
  num_layers: 4
  num_heads: 4
  dropout: 0.15
  edge_dim: 2

# Stage 2 Parameters
stage2:
  top_k: 5
  use_physics: true

# Evaluation
eval:
  top_k_values: [1, 3, 5, 10]

# Reproducibility
seed: 42
